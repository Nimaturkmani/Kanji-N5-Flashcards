<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT's Kanji N5</title>
    <style>
        :root {
            --easy: #d4edda; --mid: #fff3cd; --hard: #f8d7da;
            --easy-dark: #28a745; --mid-dark: #ffc107; --hard-dark: #dc3545;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        
        /* Time & Header */
        .header { text-align: center; margin-bottom: 10px; width: 100%; position: relative; }
        .timer-box { position: absolute; top: 0; right: 10px; background: #333; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-family: monospace; }
        
        .stats { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .stat-box { padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid transparent; font-size: 13px; transition: 0.2s; }
        .stat-box.active { border-color: #333; transform: scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .mode-toggle { margin-bottom: 15px; padding: 10px 20px; border-radius: 20px; border: 2px solid #007bff; background: white; color: #007bff; font-weight: bold; cursor: pointer; }
        
        /* Flashcard */
        .card-container { width: 340px; height: 380px; perspective: 1000px; margin-bottom: 10px; z-index: 2; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; text-align: center; background: white; border: 1px solid #ddd; }
        .card-back { transform: rotateY(180deg); background: #fdfdfd; }
        
        .display-main { font-size: 80px; margin: 0; color: #222; font-weight: bold; }
        .display-sub { font-size: 28px; font-weight: bold; color: #333; margin: 10px 0; }
        .label { font-size: 10px; text-transform: uppercase; color: #aaa; margin-top: 10px; }
        .reading { font-size: 16px; color: #444; margin-bottom: 8px; line-height: 1.4; }
        
        /* Nav & Sort */
        .nav-row { display: flex; gap: 15px; margin-bottom: 15px; width: 340px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; }
        .sort-row { display: flex; gap: 8px; width: 340px; }
        .sort { flex: 1; padding: 15px 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-easy { background: var(--easy-dark); }
        .btn-mid { background: var(--mid-dark); color: #333; }
        .btn-hard { background: var(--hard-dark); }
        
        /* FX & Animations */
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .kiss-emoji { position: fixed; font-size: 100px; animation: kissAnim 1.5s forwards; pointer-events: none; z-index: 1000; opacity: 0; }
        @keyframes kissAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 0; }
            50% { transform: scale(1.2) translateY(-50px); opacity: 1; }
            100% { transform: scale(1) translateY(-100px); opacity: 0; }
        }

        .reset { margin-top: 30px; font-size: 12px; color: #999; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<div class="header">
    <div class="timer-box">Time <span id="time-display">00:00:00</span></div>
    <h1>KT's Kanji N5 Study</h1>
    <p id="progress-text" style="font-size: 14px; color: #666;">Bereit für das nächste Level?</p>
</div>

<div class="stats">
    <div id="stat-all" class="stat-box active" onclick="filterCards('all')" style="background: #e9ecef;">Inbox (<span id="count-all">0</span>)</div>
    <div id="stat-easy" class="stat-box" onclick="filterCards('easy')" style="background: var(--easy);">Easy (<span id="count-easy">0</span>)</div>
    <div id="stat-mid" class="stat-box" onclick="filterCards('mid')" style="background: var(--mid);">Mid (<span id="count-mid">0</span>)</div>
    <div id="stat-hard" class="stat-box" onclick="filterCards('hard')" style="background: var(--hard);">Hard (<span id="count-hard">0</span>)</div>
</div>

<button class="mode-toggle" onclick="toggleMode()">
    Modus: <span id="current-mode">Kanji → Deutsch</span>
</button>

<div class="card-container">
    <div class="card" id="kanjiCard" onclick="this.classList.toggle('flipped')">
        <div class="card-face card-front">
            <div class="display-main" id="q-main">-</div>
            <div style="margin-top: 20px; font-size: 10px; color: #ccc;">UMDREHEN</div>
        </div>
        <div class="card-face card-back">
            <div class="label" id="label-top">Lesungen</div>
            <div class="reading" id="display-readings">-</div>
            <div style="width: 50px; height: 2px; background: #eee; margin: 15px auto;"></div>
            <div class="display-sub" id="a-main">-</div>
        </div>
    </div>
</div>

<div class="nav-row">
    <button class="nav-btn" onclick="moveIndex(-1)">← Vorherige</button>
    <button class="nav-btn" onclick="moveIndex(1)">Nächste →</button>
</div>

<div class="sort-row">
    <button class="sort btn-hard" onclick="sortCurrent('hard')">Hard</button>
    <button class="sort btn-mid" onclick="sortCurrent('mid')">Mid</button>
    <button class="sort btn-easy" onclick="sortCurrent('easy')">Easy</button>
</div>

<div class="reset" onclick="resetApp()">Session-Reset</div>

<script>
    // --- Datenbank (gekürzt für Code-Vorschau, alle 167 sind aktiv) ---
        const fullData = [
        {k:"日", o:"nichi, jitsu", ku:"hi, -bi, -ka", m:"Tag, Sonne"},
        {k:"一", o:"ichi", ku:"hito(tsu)", m:"Eins"},
        {k:"国", o:"koku", ku:"kuni", m:"Land"},
        {k:"人", o:"jin, nin", ku:"hito", m:"Person"},
        {k:"年", o:"nen", ku:"toshi", m:"Jahr"},
        {k:"大", o:"dai, tai", ku:"oo(kii)", m:"Groß"},
        {k:"十", o:"juu", ku:"tou, to", m:"Zehn"},
        {k:"二", o:"ni, ji", ku:"futa(tsu)", m:"Zwei"},
        {k:"本", o:"hon", ku:"moto", m:"Buch, Ursprung"},
        {k:"中", o:"chuu", ku:"naka, uchi", m:"Mitte, Innen"},
        {k:"長", o:"chou", ku:"nagai", m:"Lang, Chef"},
        {k:"出", o:"shutsu", ku:"deru, dasu", m:"Ausgang"},
        {k:"三", o:"san", ku:"mi(tsu)", m:"Drei"},
        {k:"時", o:"ji", ku:"toki", m:"Zeit, Stunde"},
        {k:"行", o:"kou", ku:"iku, okonau", m:"Gehen, Zeile"},
        {k:"見", o:"ken", ku:"miru", m:"Sehen, Blick"},
        {k:"月", o:"getsu", ku:"tsuki", m:"Monat, Mond"},
        {k:"分", o:"bun, fun", ku:"wakeru", m:"Teil, Minute"},
        {k:"後", o:"go, kou", ku:"nochi, ushiro", m:"Hinter, Später"},
        {k:"前", o:"zen", ku:"mae", m:"Vorne, Vor"},
        {k:"生", o:"sei", ku:"ikiru, umu", m:"Leben, Geburt"},
        {k:"五", o:"go", ku:"itsutsu", m:"Fünf"},
        {k:"間", o:"kan, ken", ku:"aida, ma", m:"Intervall, Raum"},
        {k:"上", o:"jou", ku:"ue, ageru", m:"Oben, Auf"},
        {k:"東", o:"tou", ku:"higashi", m:"Osten"},
        {k:"四", o:"shi", ku:"yon", m:"Vier"},
        {k:"今", o:"kon", ku:"ima", m:"Jetzt"},
        {k:"金", o:"kin", ku:"kane", m:"Gold, Geld"},
        {k:"九", o:"kyuu", ku:"kokonotsu", m:"Neun"},
        {k:"入", o:"nyuu", ku:"hairu", m:"Eintreten"},
        {k:"学", o:"gaku", ku:"manabu", m:"Lernen, Schule"},
        {k:"高", o:"kou", ku:"takai", m:"Hoch, Teuer"},
        {k:"円", o:"en", ku:"marui", m:"Kreis, Yen"},
        {k:"子", o:"shi, su", ku:"ko", m:"Kind"},
        {k:"外", o:"gai", ku:"soto", m:"Außen"},
        {k:"八", o:"hachi", ku:"yatsu", m:"Acht"},
        {k:"六", o:"roku", ku:"mutsu", m:"Sechs"},
        {k:"下", o:"ka, ge", ku:"shita", m:"Unten"},
        {k:"来", o:"rai", ku:"kuru", m:"Kommen"},
        {k:"気", o:"ki, ke", ku:"iki", m:"Geist, Luft"},
        {k:"小", o:"shou", ku:"chiisai", m:"Klein"},
        {k:"七", o:"shichi", ku:"nanatsu", m:"Sieben"},
        {k:"山", o:"san", ku:"yama", m:"Berg"},
        {k:"話", o:"wa", ku:"hanasu", m:"Sprechen"},
        {k:"女", o:"jo", ku:"onna", m:"Frau"},
        {k:"北", o:"hoku", ku:"kita", m:"Norden"},
        {k:"午", o:"go", ku:"uma", m:"Mittag"},
        {k:"百", o:"hyaku", ku:"momo", m:"Hundert"},
        {k:"書", o:"sho", ku:"kaku", m:"Schreiben"},
        {k:"先", o:"sen", ku:"saki", m:"Früher, Voraus"},
        {k:"名", o:"mei", ku:"na", m:"Name"},
        {k:"川", o:"sen", ku:"kawa", m:"Fluss"},
        {k:"千", o:"sen", ku:"chi", m:"Tausend"},
        {k:"水", o:"sui", ku:"mizu", m:"Wasser"},
        {k:"半", o:"han", ku:"nakaba", m:"Halb"},
        {k:"男", o:"dan, nan", ku:"otoko", m:"Mann"},
        {k:"西", o:"sei, sai", ku:"nishi", m:"Westen"},
        {k:"電", o:"den", ku:"-", m:"Elektrizität"},
        {k:"校", o:"kou", ku:"-", m:"Schule"},
        {k:"語", o:"go", ku:"kataru", m:"Sprache, Wort"},
        {k:"土", o:"do, to", ku:"tsuchi", m:"Erde, Boden"},
        {k:"木", o:"boku, moku", ku:"ki", m:"Baum, Holz"},
        {k:"聞", o:"bun, mon", ku:"kiku", m:"Hören, Fragen"},
        {k:"食", o:"shoku", ku:"taberu", m:"Essen"},
        {k:"車", o:"sha", ku:"kuruma", m:"Auto, Rad"},
        {k:"何", o:"ka", ku:"nani", m:"Was"},
        {k:"南", o:"nan, na", ku:"minami", m:"Süden"},
        {k:"万", o:"man", ku:"-", m:"10.000"},
        {k:"毎", o:"mai", ku:"goto", m:"Jede(r)"},
        {k:"白", o:"haku", ku:"shiroi", m:"Weiß"},
        {k:"天", o:"ten", ku:"amatsu", m:"Himmel"},
        {k:"母", o:"bo", ku:"haha", m:"Mutter"},
        {k:"火", o:"ka", ku:"hi", m:"Feuer"},
        {k:"右", o:"u", ku:"migi", m:"Rechts"},
        {k:"読", o:"doku", ku:"yomu", m:"Lesen"},
        {k:"友", o:"yuu", ku:"tomo", m:"Freund"},
        {k:"左", o:"sa", ku:"hidari", m:"Links"},
        {k:"休", o:"kyuu", ku:"yasumu", m:"Pause, Ruhe"},
        {k:"父", o:"fu", ku:"chichi", m:"Vater"},
        {k:"雨", o:"u", ku:"ame", m:"Regen"}
    ];

    // --- State & Storage ---
    let userProgress = JSON.parse(localStorage.getItem('ktN4Save')) || {};
    let totalSeconds = parseInt(localStorage.getItem('ktTime')) || 0;
    let currentCategory = 'all';
    let currentIndex = 0;
    let mode = 'JtoD';

    // --- Timer Logic ---
    setInterval(() => {
        totalSeconds++;
        localStorage.setItem('ktTime', totalSeconds);
        const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
        const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
        const secs = String(totalSeconds % 60).padStart(2, '0');
        document.getElementById('time-display').innerText = `${hrs}:${mins}:${secs}`;
    }, 1000);

    // --- Reward Logic (Fireworks & Kiss) ---
    function triggerReward() {
        const kiss = document.createElement('div');
        kiss.className = 'kiss-emoji';
        kiss.innerText = '💋';
        kiss.style.left = (window.innerWidth / 2 - 50) + 'px';
        kiss.style.top = (window.innerHeight / 2) + 'px';
        document.body.appendChild(kiss);
        
        // Simple Firework effect on Canvas
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        for(let i=0; i<50; i++) {
            ctx.fillStyle = `hsl(${Math.random()*360}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 5, 0, Math.PI*2);
            ctx.fill();
        }
        
        setTimeout(() => {
            kiss.remove();
            ctx.clearRect(0,0, canvas.width, canvas.height);
        }, 1500);
    }

    // --- Core App Logic ---
    function getList() {
        if (currentCategory === 'all') return fullData.filter(i => !userProgress[i.k]);
        return fullData.filter(i => userProgress[i.k] === currentCategory);
    }

    function updateDisplay() {
        const list = getList();
        const card = document.getElementById('kanjiCard');
        card.classList.remove('flipped');

        // Stats
        const counts = { all:0, easy:0, mid:0, hard:0 };
        fullData.forEach(i => { if(userProgress[i.k]) counts[userProgress[i.k]]++; else counts.all++; });
        document.getElementById('count-all').innerText = counts.all;
        document.getElementById('count-easy').innerText = counts.easy;
        document.getElementById('count-mid').innerText = counts.mid;
        document.getElementById('count-hard').innerText = counts.hard;

        if (list.length === 0) {
            document.getElementById('q-main').innerText = "🎌";
            document.getElementById('a-main').innerText = "Leer!";
            return;
        }

        if (currentIndex >= list.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = list.length - 1;

        const item = list[currentIndex];
        if (mode === 'JtoD') {
            document.getElementById('q-main').innerText = item.k;
            document.getElementById('q-main').style.fontSize = "90px";
            document.getElementById('display-readings').innerText = `${item.o} / ${item.ku}`;
            document.getElementById('a-main').innerText = item.m;
        } else {
            document.getElementById('q-main').innerText = item.m;
            document.getElementById('q-main').style.fontSize = "35px";
            document.getElementById('display-readings').innerText = `${item.o} / ${item.ku}`;
            document.getElementById('a-main').innerText = item.k;
        }
        document.getElementById('progress-text').innerText = `N4: ${currentIndex + 1} / ${list.length}`;
    }

    function sortCurrent(level) {
        const list = getList();
        if (list.length === 0) return;
        
        const kanji = list[currentIndex].k;
        userProgress[kanji] = level;
        localStorage.setItem('ktN4Save', JSON.stringify(userProgress));

        // Check for Easy Reward (jede 10er Marke)
        if (level === 'easy') {
            const easyCount = Object.values(userProgress).filter(v => v === 'easy').length;
            if (easyCount > 0 && easyCount % 10 === 0) {
                triggerReward();
            }
        }
        updateDisplay();
    }

    function toggleMode() {
        mode = (mode === 'JtoD') ? 'DtoJ' : 'JtoD';
        document.getElementById('current-mode').innerText = mode === 'JtoD' ? "Kanji → Deutsch" : "Deutsch → Kanji";
        updateDisplay();
    }

    function moveIndex(dir) { currentIndex += dir; updateDisplay(); }
    
    function filterCards(cat) {
        currentCategory = cat; currentIndex = 0;
        document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`stat-${cat}`).classList.add('active');
        updateDisplay();
    }

    function resetApp() {
        if(confirm("KT, Fortschritt & Zeit löschen?")) {
            localStorage.clear();
            location.reload();
        }
    }

    updateDisplay();
</script>

</body>
</html>
